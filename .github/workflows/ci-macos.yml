name: CI macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  macos:
    uses: ./.github/workflows/build-and-test-template.yml
    with:
      os: macos-15
      compiler_cc: clang
      compiler_cxx: clang++
